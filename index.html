function pad(n){return n.toString().padStart(2,'0')}
function tick(){
  const now=new Date();
  document.getElementById('clock').textContent=now.toLocaleDateString('zh-CN')+' '+pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
  document.getElementById('last-upd').textContent='最后同步: '+pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
}

let currentFxBase = 7.2541;
function fxTick(){
  const r = currentFxBase + (Math.random()-0.5)*currentFxBase*0.0015;
  document.getElementById('rate-val').textContent = r < 1 ? r.toFixed(6) : r.toFixed(4);
}

const geoColors = {'低':'#16a34a','中':'#d97706','高':'#dc2626'};

function render(){
  const key = document.getElementById('country-sel').value;
  const d = DATA[key];

  document.getElementById('d-sub').textContent = d.sub;
  document.getElementById('t-fx-label').textContent = d.fxLabel;
  document.getElementById('t-fx-sub').textContent = d.fxSub;
  document.getElementById('t-vol').textContent = d.vol;
  document.getElementById('t-vol-sub').textContent = d.volSub;
  document.getElementById('t-policy').textContent = d.policyCount;
  document.getElementById('t-geo').innerHTML = `<span style="color:${geoColors[d.geoLevel]}">${d.geoLevel}</span>`;
  document.getElementById('t-geo-sub').textContent = d.geoSub;
  document.getElementById('fx-sub2').textContent = d.fxLabel + ' 近7日趋势';

  currentFxBase = d.fxBase;
  fxTick();

  // FX bar chart
  const maxV = Math.max(...d.fxHistory);
  const minV = Math.min(...d.fxHistory);
  const range = (maxV - minV) || maxV*0.001;
  const barsHtml = d.fxHistory.map(v=>{
    const h = 15 + ((v-minV)/range)*35;
    return `<div class="fx-bar" style="height:${h}px"></div>`;
  }).join('');
  document.getElementById('fx-chart').innerHTML = barsHtml;
  document.getElementById('fx-labels').innerHTML = ['D-6','D-5','D-4','D-3','D-2','D-1','今日'].map(l=>`<span>${l}</span>`).join('');

  document.getElementById('key-rates').innerHTML = d.keyRates.map(r=>`
    <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:12px">
      <span style="color:var(--color-text-secondary)">${r[0]}</span><span style="font-weight:500;color:var(--color-text-primary)">${r[1]}</span>
    </div>`).join('');

  document.getElementById('news-list').innerHTML = d.news.map(n=>`
    <div class="item-row">
      <div class="icon icon-${n.color}"><i class="ti ${n.icon}" aria-hidden="true"></i></div>
      <div>
        <div class="itxt">${n.text}</div>
        <div class="imeta">${n.meta}</div>
        ${n.tags.map(t=>`<span class="tag tag-${t[1]}">${t[0]}</span>`).join('')}
      </div>
    </div>`).join('');

  document.getElementById('capital-list').innerHTML = d.capital.map(c=>`
    <div class="item-row">
      <div class="icon icon-${c.color}"><i class="ti ${c.icon}" aria-hidden="true"></i></div>
      <div><div class="itxt">${c.text}</div><div class="imeta">${c.meta}</div></div>
    </div>`).join('');

  document.getElementById('taxpolicy-list').innerHTML = d.taxpolicy.map(t=>`
    <div class="tl-item"><div class="tl-dot" style="background:${t.color}"></div><div><div class="tl-text">${t.text}</div><div class="tl-date">${t.date}</div></div></div>`).join('');

  document.getElementById('geo-list').innerHTML = d.geo.map(g=>`
    <div class="tl-item"><div class="tl-dot" style="background:${g.color}"></div><div><div class="tl-text">${g.text}</div><div class="tl-date">${g.date}</div></div></div>`).join('');
}

tick();setInterval(tick,1000);
setInterval(fxTick,4000);
render();
</script>
